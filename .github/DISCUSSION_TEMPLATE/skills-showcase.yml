title: "[Skill name] "
labels: ["skills-showcase"]
body:
  - type: markdown
    attributes:
      value: |
        ## Share Your Skill!
        Fill out the form below to showcase what you have built.

  - type: input
    id: repo-link
    attributes:
      label: Skill Source Repository
      description: Provide the link to your GitHub repository source code.
      placeholder: https://github.com/username/repo-name/path/to/skill
    validations:
      required: true

  - type: input
    id: webhost-path
    attributes:
      label: Skill Webhost Path
      description: The root path to the skill hosted on a web hosting service.
      placeholder: https://username.github.io/repo-name/path/to/skill
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > ⚠️ **Note on Webhost Path:** This must be a live deployment (like GitHub Pages, Cloudflare, etc.). This **cannot** be a standard GitHub repository URL or a raw file link like `https://raw.githubusercontent.com/...`.

  - type: textarea
    id: skill-details
    attributes:
      label: More Info About the Skill
      description: Provide instructions, descriptions, or screenshots. 
    validations:
      required: false